<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Akane</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Crimson+Pro:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="shell">
    <!-- Speech bubble (shows latest message) -->
    <section class="bubble-stage" aria-live="polite" aria-label="Akane's message">
      <div class="speech-bubble" id="speechBubble" hidden>
        <img
          class="speech-bubble-decoration"
          src="../../../images/Text%20Bubble%20decoration.png"
          alt=""
          aria-hidden="true"
        />
        <div class="speech-bubble-header pywebview-drag-region">
          <div class="speech-bubble-header-main">
            <span class="speech-icon">✿</span>
            <span class="speech-name">Akane</span>
            <span class="status-text" id="statusText"></span>
          </div>
        </div>
        <div class="speech-bubble-body" id="speechBody"></div>
      </div>
    </section>

    <!-- Character art — swap src for your transparent PNG -->
    <div class="character-wrap" id="characterWrap">
      <img
        class="character-art"
        id="characterArt"
        src="../../../images/Vtuber_model.png"
        alt=""
        onerror="this.onerror=null;this.src='../../../images/Vtuber_model.png';"
      />
      <div class="avatar-hitbox" id="avatarHitbox" aria-hidden="true"></div>
      <div class="avatar-action-dock" aria-label="Akane actions">
        <button class="avatar-action-btn avatar-action-btn-small avatar-action-btn-memory" id="memoryActionButton" type="button" aria-label="Show memory"></button>
        <!-- <button class="avatar-action-btn avatar-action-btn-small avatar-action-btn-approve" id="approveCodeButton" type="button" aria-label="Review code changes" hidden></button> -->
        <button class="avatar-action-btn avatar-action-btn-message" id="messageActionButton" type="button" aria-label="Open chat input"></button>
        <button class="avatar-action-btn avatar-action-btn-small avatar-action-btn-minimize" id="minimizeButton" type="button" aria-label="Minimize"></button>
        <button class="avatar-action-btn avatar-action-btn-small avatar-action-btn-close" id="closeButton" type="button" aria-label="Close"></button>
      </div>
    </div>

    <!-- Composer bar -->
    <form class="composer" id="composer">
      <label class="sr-only" for="messageInput">Ask Akane</label>
      <textarea
        id="messageInput"
        rows="1"
        placeholder="Ask Akane anything..."
        autocomplete="off"
      ></textarea>
      <button class="composer-send" id="sendButton" type="submit" aria-label="Send"></button>
    </form>

    <p class="notice" id="notice" hidden></p>

  </main>
  <div class="memory-panel" id="memoryPanel" hidden>
    <div class="memory-header">
      <h3>Model Memory</h3>
      <button class="memory-close-btn" id="memoryCloseBtn" type="button" aria-label="Close memory panel">✕</button>
    </div>
    <div class="memory-content" id="memoryContent">
      <div class="memory-loading">Loading memory...</div>
    </div>
  </div>
  <template id="emptyState">
    <div class="empty-state" aria-hidden="true"></div>
  </template>
  <script src="app.js" defer></script>
</body>
</html>
